services:
  - type: pserv
    name: ethara-db
    ipAllowList: []
    plan: free
    postgresVersion: 16

  - type: web
    name: ethara-backend
    runtime: python
    pythonVersion: 3.12
    buildCommand: pip install -r backend/requirements.txt
    startCommand: bash backend/start.sh
    envVars:
      - key: PYTHONUNBUFFERED
        value: 1
      - key: DATABASE_URL
        fromDatabase:
          name: ethara-db
          property: connectionString
      - key: BACKEND_CORS_ORIGINS
        value: https://ethara.vercel.app,https://ethara-frontend.onrender.com
    depends_on:
      - ethara-db
