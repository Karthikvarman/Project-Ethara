services:
  - type: web
    name: ethara-backend
    runtime: python
    pythonVersion: 3.12
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONUNBUFFERED
        value: 1
      - key: DATABASE_URL
        fromDatabase:
          name: etharadb
          property: connectionString
      - key: BACKEND_CORS_ORIGINS
        value: https://ethara.vercel.app,https://ethara-frontend.onrender.com

  - type: pserv
    name: etharadb
    ipAllowList: []
    plan: free
    postgresVersion: 16
